meta:
  law: POJK No. 22 Tahun 2023
  law_legacy: POJK No. 6/POJK.07/2022 (replaced by POJK No. 22 Tahun 2023)
  article: Pasal 3, 29, 30, 32, 33, 35, 36, 37, 53
  name: Pelindungan Konsumen di Sektor Jasa Keuangan — Pengaturan Iklan
  jurisdiction: 인도네시아 (OJK)
  effective_date: '2024-01-09'
  version: '1.1'
  description: 인도네시아 금융서비스 사업자(PUJK)의 정보제공·마케팅·광고는 명확하고 정확하며 정직하고, 소비자를 오인하게 하지 않아야 한다. 본 트리는 POJK No. 22 Tahun 2023의 소비자보호 원칙, 상품/서비스 정보제공, 위험·비용 고지, 광고/프로모션 표시, 적합성 및 광고 내용과 실제 제공조건의 일치 의무를 금소법 17·21·22조 리스크 유형과 대응되도록 5개 위반유형으로 구조화한다.
  severity_weights:
    VIOLATION: 1.0
    WARNING: 0.6
    PASS: 0.0
  exclude_patterns:
  - tidak\s*dijamin
  - tidak\s*menjamin
  - mengandung\s*risiko
  - risiko\s*kerugian\s*(dapat|bisa)\s*(terjadi|dialami)
  - berpotensi\s*(rugi|mengalami\s*kerugian)
  - dapat\s*(turun|berkurang|rugi)
  - baca\s*prospektus
  legal_audit_status: 'MVP 법학 검수 완료: OJK 공식 POJK 22/2023 PDF 기준 핵심 조항 매핑. 세부 문언은 현지 법률전문가 최종 검토 필요.'
  # ── 위반 유형의 권위 근거 — OJK 실제 광고 집행 ──
  # 작성자 임의 판단이 아니라 OJK가 시장행위 감독으로 제재해 온 광고 유형에 근거.
  enforcement_basis: >
    OJK는 오인성 금융광고를 market conduct 감독으로 점검·제재해 왔으며
    (2022년 부적절 광고 244건 차단, 이후 광고 위반 행정제재 지속),
    'keuntungan pasti(확정 수익)' · 'bebas risiko·dijamin aman(무위험·보장)' 등
    확정수익·무위험 표현을 POJK 22/2023 Pasal 29(명확·정직·비오인 정보의무) 위반 유형으로 본다.
    본 트리의 탐지 패턴은 이 집행 유형에 근거하며 임의 작성이 아니다.
rules:
- id: ojk_1_keuntungan_pasti
  law: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
  name: Larangan Janji Keuntungan Pasti (확정 수익 약속 금지)
  description: 수익·이익을 확정·보장하는 광고 표현 금지
  maps_to_ko: finsumer_22_1_단정적표현
  nodes:
  - id: rule_ojk_1_a
    type: rule
    check: 확정 수익 보장 표현 (보장어 + 수익어)
    pattern: (dijamin|pasti|menjanjikan|terjamin|menjamin).{0,20}(keuntungan|imbal hasil|laba|untung|return|hasil)
    flags: IGNORECASE
    on_match:
      result: VIOLATION
      reason: 확정 수익·보장 표현은 상품/서비스 정보가 명확·정확·정직하고 오인을 유발하지 않아야 한다는 POJK 22/2023 정보제공·마케팅 의무 위반 소지가 있습니다.
      confidence: 0.95
      citation: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
      action: '즉시 수정: ''dijamin/pasti'' 등 확정 표현 삭제, ''berpotensi(잠재적)'' 등 중립 표현으로 교체'
  - id: rule_ojk_1_b
    type: rule
    check: 역방향 — 수익어 + 보장어
    pattern: (keuntungan|imbal hasil|laba|untung|return).{0,15}(dijamin|pasti|terjamin|\d+\s*%\s*per tahun)
    flags: IGNORECASE
    on_match:
      result: VIOLATION
      reason: 확정 수익·보장 표현은 상품/서비스 정보가 명확·정확·정직하고 오인을 유발하지 않아야 한다는 POJK 22/2023 정보제공·마케팅 의무 위반 소지가 있습니다.
      confidence: 0.9
      citation: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
      action: 즉시 수정 요망
  - id: llm_ojk_1
    type: llm
    model: llama-3.3-70b-versatile
    check: 맥락상 확정 수익 암시 여부 (규칙 미탐지 케이스)
    trigger_when: rule_nodes_pass
    system_prompt: '당신은 인도네시아 OJK 규정(POJK No. 22 Tahun 2023) 전문 준법 심사관입니다. 인도네시아어 금융광고가 확정적 수익을 약속하거나 보장하는 인상을 주는지 판단하세요.

      '
    prompt: '다음 인도네시아어 금융광고 문구를 분석하세요.


      [Teks Iklan / 광고 문구]

      {text}


      판단 기준: 수익(keuntungan/imbal hasil)을 확정적으로 표현하거나

      보장하는 인상을 주는가? (예: "memberikan keuntungan stabil(안정적 수익 제공)",

      "hasil yang menguntungkan(이익이 나는 결과)" 등 암시 표현도 위반 가능)


      반드시 아래 JSON 형식으로만 답하세요:

      {{"triggered": true/false, "reason": "판단 근거 1~2문장 (한국어, 반드시 ''~합니다'' 존댓말체로 작성)", "confidence": 0.0~1.0}}

      '
    on_match:
      result: WARNING
      reason: 맥락상 확정 수익 암시 의심 (LLM 판단)
      confidence: 0.75
      citation: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
  legal_basis:
    primary:
    - POJK No. 22 Tahun 2023 Pasal 29
    - POJK No. 22 Tahun 2023 Pasal 32
    supplementary:
    - POJK No. 22 Tahun 2023 Pasal 3
    - POJK No. 22 Tahun 2023 Pasal 53
- id: ojk_2_bebas_risiko
  law: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
  name: Larangan Klaim Bebas Risiko (무위험 표현 금지)
  description: 원금 손실 가능 상품에서 무위험·원금안전 표현 금지
  maps_to_ko: finsumer_22_2_원금보장
  nodes:
  - id: rule_ojk_2_a
    type: rule
    check: 무위험 직접 표현
    pattern: '(bebas risiko|tanpa risiko|tanpa kerugian|tidak\s*akan\s*rugi|tidak\s*mungkin\s*mengalami\s*kerugian|tidak\s*akan\s*mengalami\s*kerugian|mustahil\s*rugi|modal.{0,15}(dijamin|aman|kembali|terjamin)|pokok.{0,15}(aman|dijamin|terjamin)|100\s*%\s*aman|tidak\s*akan\s*berkurang)'
    flags: IGNORECASE
    on_match:
      result: VIOLATION
      reason: 무위험·원금안전 표현은 위험 정보와 실제 제공조건에 대한 소비자 오인 가능성이 있어 POJK 22/2023상 정보제공 의무 위반 소지가 있습니다.
      confidence: 0.97
      citation: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
      action: 무위험 표현 즉시 삭제 및 원금손실 가능성(risiko kerugian) 명시
  - id: rule_ojk_2_b
    type: rule
    check: 안전 암시 표현
    pattern: (aman|terjamin|terlindungi).{0,20}(investasi|produk|dana|tabungan|modal)
    flags: IGNORECASE
    on_match:
      result: VIOLATION
      reason: 무위험·원금안전 표현은 위험 정보와 실제 제공조건에 대한 소비자 오인 가능성이 있어 POJK 22/2023상 정보제공 의무 위반 소지가 있습니다.
      confidence: 0.88
      citation: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
      action: 즉시 수정 요망
  - id: llm_ojk_2
    type: llm
    model: llama-3.3-70b-versatile
    check: 간접적 원금 보장·무위험 암시 여부
    trigger_when: rule_nodes_pass
    system_prompt: '당신은 인도네시아 OJK 규정 전문 준법 심사관입니다. 원금 손실이 가능한 투자상품 광고가 무위험·원금안전을 암시하는지 판단하세요.

      '
    prompt: '다음 인도네시아어 금융광고 문구를 분석하세요.


      [Teks Iklan / 광고 문구]

      {text}


      판단 기준: 직접적 ''bebas risiko'' 표현이 없더라도, 원금 손실이

      없다는 인상을 주는가? (예: "investasi yang aman(안전한 투자)",

      "tenang tanpa khawatir(걱정 없이 안심)" 등)


      반드시 아래 JSON 형식으로만 답하세요:

      {{"triggered": true/false, "reason": "판단 근거 1~2문장 (한국어, 반드시 ''~합니다'' 존댓말체로 작성)", "confidence": 0.0~1.0}}

      '
    on_match:
      result: WARNING
      reason: 간접적 무위험 암시 의심 (LLM 판단)
      confidence: 0.78
      citation: POJK No. 22 Tahun 2023 Pasal 29, Pasal 32, Pasal 53
  legal_basis:
    primary:
    - POJK No. 22 Tahun 2023 Pasal 29
    - POJK No. 22 Tahun 2023 Pasal 32
    supplementary:
    - POJK No. 22 Tahun 2023 Pasal 30
    - POJK No. 22 Tahun 2023 Pasal 53
- id: ojk_3_risiko_tidak_diungkap
  law: POJK No. 22 Tahun 2023 Pasal 30, Pasal 32, Pasal 33
  name: Kewajiban Pengungkapan Risiko (위험 고지 의무)
  description: 투자성 상품 광고 시 손실 위험 필수 고지
  maps_to_ko: finsumer_22_3_손실미고지
  nodes:
  - id: rule_ojk_3_a
    type: rule
    check: 투자성 상품 키워드 존재 확인
    pattern: (investasi|reksa\s*dana|saham|obligasi|sukuk|derivatif|ETF|deposito berjangka|produk pasar modal)
    flags: IGNORECASE
    on_match:
      result: PASS
      reason: 투자성 상품 광고 확인 — 위험고지 여부 추가 검토 필요
      confidence: 0.0
      _internal: true
  - id: rule_ojk_3_b
    type: rule
    check: 위험 고지 문구 역방향 탐지 (없으면 위반)
    pattern: (risiko\s*(kerugian|investasi)?|kerugian|baca\s*prospektus|dapat\s*(turun|berkurang)|tidak\s*dijamin)
    flags: IGNORECASE
    negate: true
    prerequisite: rule_ojk_3_a
    on_match:
      result: VIOLATION
      reason: 투자성 상품에서 위험(risiko) 정보를 충분히 제시하지 않으면 상품 요약정보와 마케팅 전 정보제공 의무 위반 소지가 있습니다.
      confidence: 0.88
      citation: POJK No. 22 Tahun 2023 Pasal 30, Pasal 32, Pasal 33
      action: '''Investasi mengandung risiko, baca prospektus(투자에는 위험이 있으며 투자설명서를 읽으세요)'' 등 위험 고지 문구 추가 필수'
  - id: llm_ojk_3
    type: llm
    model: llama-3.3-70b-versatile
    check: 위험 고지 충분성 판단
    trigger_when: always
    prerequisite: rule_ojk_3_a
    system_prompt: '당신은 인도네시아 OJK 규정 전문 준법 심사관입니다. 투자성 금융상품 광고에서 손실 위험 고지가 충분한지 판단하세요.

      '
    prompt: '다음 인도네시아어 투자상품 광고 문구를 분석하세요.


      [Teks Iklan / 광고 문구]

      {text}


      판단 기준:

      1. 손실 위험(risiko kerugian)이 명시되어 있는가?

      2. 위험 고지가 형식적이거나 사실상 숨겨져 있는가?

      3. 수익 홍보 대비 위험 고지가 현저히 부각되지 않는가?


      반드시 아래 JSON 형식으로만 답하세요:

      {{"triggered": true/false, "reason": "판단 근거 1~2문장 (한국어, 반드시 ''~합니다'' 존댓말체로 작성)", "confidence": 0.0~1.0}}

      '
    on_match:
      result: WARNING
      reason: 위험 고지 불충분 의심 (LLM 판단)
      confidence: 0.72
      citation: POJK No. 22 Tahun 2023 Pasal 30, Pasal 32, Pasal 33
  legal_basis:
    primary:
    - POJK No. 22 Tahun 2023 Pasal 30
    - POJK No. 22 Tahun 2023 Pasal 32
    supplementary:
    - POJK No. 22 Tahun 2023 Pasal 33
- id: ojk_4_biaya_tidak_diungkap
  law: POJK No. 22 Tahun 2023 Pasal 30, Pasal 32, Pasal 33
  name: Kewajiban Pengungkapan Biaya (비용 고지 의무)
  description: 수익률 강조 광고 시 수수료·비용(biaya) 미기재 금지
  maps_to_ko: finsumer_22_4_비용누락
  nodes:
  - id: rule_ojk_4_a
    type: rule
    check: 수익률 강조 키워드 존재
    pattern: (imbal hasil|return|keuntungan|bunga|\d+\s*%\s*per\s*(tahun|bulan))
    flags: IGNORECASE
    on_match:
      result: PASS
      reason: 수익률 광고 확인 — 비용 고지 여부 추가 검토 필요
      confidence: 0.0
      _internal: true
  - id: rule_ojk_4_b
    type: rule
    check: 비용 고지 문구 역방향 탐지 (없으면 위반)
    pattern: (biaya|komisi|biaya\s*(administrasi|pengelolaan|transaksi)|pajak|potongan)
    flags: IGNORECASE
    negate: true
    prerequisite: rule_ojk_4_a
    on_match:
      result: VIOLATION
      reason: 수익률·금리·한도 등 유리한 조건을 표시하면서 비용·조건 정보를 충분히 제공하지 않으면 POJK 22/2023상 핵심정보 제공 의무 위반 소지가 있습니다.
      confidence: 0.85
      citation: POJK No. 22 Tahun 2023 Pasal 30, Pasal 32, Pasal 33
      action: 운용보수·수수료·세금(biaya pengelolaan, komisi, pajak) 등 주요 비용 명시 추가 필수
  - id: rule_ojk_4_c
    type: rule
    check: 한도·금리 강조 시 조건 설명 확인
    pattern: (limit|plafon|pinjaman\s*hingga|bunga\s*(mulai|rendah)|hingga\s*Rp\s*[0-9.,]+).{0,30}(cepat|mudah|instan|praktis)?
    flags: IGNORECASE
    on_match:
      result: WARNING
      reason: 한도·금리 등 유리한 조건의 적용 기준과 심사 조건이 충분히 설명되었는지 확인이 필요합니다.
      confidence: 0.66
      citation: POJK No. 22 Tahun 2023 Pasal 30, Pasal 32, Pasal 33
      action: 조건, 심사 기준, 적용 가능 범위, biaya 정보를 함께 표시
  - id: llm_ojk_4
    type: llm
    model: llama-3.3-70b-versatile
    check: 비용 고지 적정성 판단
    trigger_when: rule_nodes_pass
    prerequisite: rule_ojk_4_a
    system_prompt: '당신은 인도네시아 OJK 규정 전문 준법 심사관입니다. 금융상품 광고에서 수수료·비용(biaya) 고지가 적절한지 판단하세요.

      '
    prompt: '다음 인도네시아어 금융광고 문구를 분석하세요.


      [Teks Iklan / 광고 문구]

      {text}


      판단 기준:

      1. 수익률·금리(imbal hasil/bunga)를 강조하면서 비용(biaya)을 전혀 언급하지 않는가?

      2. 비용 정보가 불명확하거나 소비자가 인식하기 어렵게 표시되었는가?


      반드시 아래 JSON 형식으로만 답하세요:

      {{"triggered": true/false, "reason": "판단 근거 1~2문장 (한국어, 반드시 ''~합니다'' 존댓말체로 작성)", "confidence": 0.0~1.0}}

      '
    on_match:
      result: WARNING
      reason: 비용 고지 불충분 의심 (LLM 판단)
      confidence: 0.7
      citation: POJK No. 22 Tahun 2023 Pasal 30, Pasal 32, Pasal 33
  legal_basis:
    primary:
    - POJK No. 22 Tahun 2023 Pasal 30
    - POJK No. 22 Tahun 2023 Pasal 32
    supplementary:
    - POJK No. 22 Tahun 2023 Pasal 33
    - POJK No. 22 Tahun 2023 Pasal 53
- id: ojk_5_perbandingan_tanpa_dasar
  law: POJK No. 22 Tahun 2023 Pasal 3, Pasal 29, Pasal 32
  name: Larangan Perbandingan Tanpa Dasar (근거없는 비교 금지)
  description: 객관적 근거 없이 타 상품 대비 우위·최상급 표현 금지
  maps_to_ko: finsumer_22_5_근거없는비교
  nodes:
  - id: rule_ojk_5_a
    type: rule
    check: 타 상품 대비 우위 직접 비교 표현
    pattern: (produk lain|bank lain|pesaing|dibandingkan).{0,20}(lebih|unggul|tinggi|baik|menguntungkan)|(lebih|unggul|tinggi|baik|menguntungkan).{0,20}(dibanding|produk lain|produk biasa|bank lain|pesaing)
    flags: IGNORECASE
    on_match:
      result: VIOLATION
      reason: 근거 없는 비교·최상급 표현은 건전한 경쟁 및 명확·정확·비오인 정보제공 원칙 위반 소지가 있습니다.
      confidence: 0.88
      citation: POJK No. 22 Tahun 2023 Pasal 3, Pasal 29, Pasal 32
      action: 비교 근거 자료(sumber, tanggal, objek pembanding) 명시 또는 비교 표현 삭제
  - id: rule_ojk_5_b
    type: rule
