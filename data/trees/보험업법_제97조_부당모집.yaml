meta:
  law: 보험업법 제97조 (보험계약 체결·모집 금지행위)
  name: 보험업법 부당 모집행위
  jurisdiction: 한국 (보험업법 제97조)
  version: '1.0'
  severity_weights:
    VIOLATION: 1.0
    WARNING: 0.6
    PASS: 0.0
rules:
  - id: rule_block_1
    law: 보험업법 제97조 (보험계약 체결·모집 금지행위)
    name: 부당 모집·허위 고지
    nodes:
      - id: bo_97_pay
        type: rule
        check: 위험 표현 심의 기준 신설
        pattern: 보험금.{0,10}(무조건|전액|100\s*%|조건\s*없이).{0,6}(지급|보상|보장)
        flags: IGNORECASE
        origin: expert
        on_match:
          result: VIOLATION
          confidence: 0.9
          reason: 보험금 지급조건을 사실과 다르게 알리거나 중요사항을 누락한 표현입니다(무조건·전액 지급 오인).
          citation: 보험업법 제97조 제1항 제1호
          action: 지급조건·면책사항을 명시하고 '무조건/전액 지급' 등 단정 표현 삭제
      - id: bo_97_switch
        type: rule
        check: 위험 표현 심의 기준 신설
        pattern: (기존|다른\s*회사|타사)\s*(보험|계약).{0,15}(해지|해약).{0,15}(가입|갈아|청약|유리|이득)
        flags: IGNORECASE
        origin: expert
        on_match:
          result: WARNING
          confidence: 0.8
          reason: 기존 보험계약을 부당하게 소멸시키고 신규 가입을 유도하는 부당 승환계약 소지가 있습니다.
          citation: 보험업법 제97조
          action: 기존계약 해지 시 불이익(예정이율·면책기간 등) 비교 고지 여부 확인
