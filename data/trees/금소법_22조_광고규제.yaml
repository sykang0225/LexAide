# ============================================================
# 금융소비자보호법 제22조 — 광고 규제 의사결정 트리 DSL
# Cross-Check AI | YAML DSL v1.0
#
# 위반 유형 5가지:
#   1. 단정적_표현    — 확정·보장·반드시 등 단정적 수익 표현
#   2. 원금_보장      — 원금 보장 허위 표시
#   3. 손실_미고지    — 원금손실 가능성 미기재
#   4. 비용_누락      — 수수료·세금 등 핵심 비용 미기재
#   5. 근거없는_비교  — 타 상품 대비 우위 주장 (근거 없음)
#
# 각 유형: rule 노드(정규식) → llm 노드(애매 케이스) 구조
# ============================================================

meta:
  law: 금융소비자보호법 제22조 (광고 규제)
  article: 22
  name: 금융상품 광고 규제
  effective_date: "2021-03-25"
  version: "1.1"
  description: >
    금융상품 광고 시 소비자를 오인하게 하거나 불리한 내용을
    누락·축소하는 행위를 금지한다.
    내용적 금지행위의 구체적 기준은 제22조의 위임을 받은
    동법 시행령 제18조·제19조 및 금융소비자보호 감독규정에 규정됨.
  # 법적 근거 (★ 법학 전공자 검수 반영 — 제22조 제1항은 '광고 주체' 조항이므로
  #            내용적 금지행위는 제22조 + 시행령으로 인용 정정)
  legal_note: >
    제22조 제1항은 '광고 주체'를 규정하므로, 단정적 표현·근거없는 비교 등
    내용적 금지행위는 '제22조 및 동법 시행령 제18조·제19조'로 인용함.
  # ── 실무해석(WARNING) 노드의 권위 근거 ─────────────────────────
  # WARNING 등급 패턴은 작성자 임의 판단이 아니라, 금융감독원이
  # 2025.2 광고 점검 보도자료에서 '오인 가능성'으로 직접 적시한
  # 위반 유형을 탐지 패턴으로 옮긴 것이다. (출처 추적 가능)
  interpretation_basis:
    - node: rule_22_1_c (안정적·검증된 수익 암시)
      authority: "금감원 2025.2.10 ETF 광고 점검 — '투자 위험성을 축소하고 안정적인 수익만을 강조하는 광고'"
    - node: rule_22_4_c (최저금리 조건 부족)
      authority: "금감원 2025.2.3 대출 광고 점검 — '최저금리만 비대칭적으로 노출'"
    - node: rule_22_4_e (빠른 심사·누구나·즉시)
      authority: "금감원 2025.2.3 대출 광고 점검 — '신속성 과장 단정적 표현(예: 90초 뚝딱)'"
    - node: rule_22_4_f (부담 완화·저렴 표현)
      authority: "금감원 2025.2.18 보험 광고 점검 — \"'단돈 만원' 등 저렴 오인 표현\""
  interpretation_note: >
    WARNING(해석성) 노드는 전부 사람 검토로 라우팅되는 1차 후보이며 자동 최종판정이 아니다.
    VIOLATION(자동 강판정)은 조문 직결 표현(원금보장·단정적 수익)에만 부여한다.
  severity_weights:
    VIOLATION: 1.0
    WARNING: 0.6
    PASS: 0.0
  # 글로벌 면책·부정문 패턴 — 모든 rule 노드의 positive match에 적용 (오탐 방지)
  exclude_patterns:
    - '보장하지\s*않'
    - '보장되지\s*않'
    - '확정되지\s*않'
    - '손실\s*가능'
    - '원금\s*손실(이)?\s*(발생|가능)'
    - '손실이\s*발생할\s*수\s*있'
    - '최저.{0,30}최고.{0,10}(금리|%)'
    - '순자산.{0,5}(은|이|가)?\s*감소'
    - '세액공제.{0,3}한도|납입\s*한도|공제\s*한도'

rules:

  # ──────────────────────────────────────────────────────────
  # 위반유형 1 | 단정적 표현 (제22조 제1항 제2호)
  # 수익·이익을 확정적으로 표현하는 광고 문구
  # ──────────────────────────────────────────────────────────
  - id: finsumer_22_1_단정적표현
    law: 금융소비자보호법 제22조 및 동법 시행령 제19조
    name: 단정적 표현 금지
    description: "수익·이익 실현을 단정·보장하는 표현 사용 금지"
    legal_basis:
      primary:
        - 금융소비자보호법 제22조
      supplementary:
        - 금융소비자보호법 시행령 제19조 (광고 시 금지행위)
        - 금융소비자보호 감독규정 제17조
    nodes:

      - id: rule_22_1_a
        type: rule
        check: "단정적 수익 보장 표현 (강한 확정어 + 수익어)"
        pattern: '(확정|보장|반드시|절대로?|무조건|틀림없이).{0,15}(수익|이익|이자|배당|수령)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "단정적 수익 보장 표현 금지 위반"
          confidence: 0.95
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "즉시 수정 요망: 확정적 표현 삭제 또는 '추구' 등 중립 표현으로 교체"

      - id: rule_22_1_b
        type: rule
        check: "수익 확정 역방향 패턴 (수익어 + 단정어)"
        pattern: '(수익|이익|이자|배당).{0,10}(확정|보장|지급\s*보장|드립니다)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "수익 지급 보장 표현 금지 위반"
          confidence: 0.92
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "즉시 수정 요망"

      - id: rule_22_1_c
        type: rule
        check: "안정적 수익·성과 암시 표현"
        pattern: '(안정적|검증된|꾸준한|든든한).{0,12}(수익|성과|자산관리|투자\s*상품)|부담\s*없이.{0,15}(투자|시작)|전문가.{0,20}(성과|추천|선정)'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "수익 가능성을 사실상 안정적으로 기대하게 할 수 있는 표현입니다."
          confidence: 0.68
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          source: "금감원 2025.2.10 ETF 광고 점검(안정적 수익만 강조 지적)"
          action: "성과·안정성 표현의 근거와 손실 가능성 고지를 함께 확인"

      - id: llm_22_1
        type: llm
        model: llama-3.3-70b-versatile
        check: "맥락상 단정적 수익 암시 여부 (규칙 미탐지 케이스)"
        trigger_when: rule_nodes_pass   # rule 노드가 모두 PASS일 때만 실행
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          광고 문구가 법 제22조(광고 규제)를 위반하는지 판단하세요.
          답변의 reason에는 '제○항 제○호' 같은 세부 항·호를 임의로 적지 마세요.
          위반 기준: 투자 결과를 단정적으로 표현하거나 수익을 보장하는 인상을 주는 표현.
        prompt: |
          다음 광고 문구를 분석하세요.

          [광고 문구]
          {text}

          판단 기준: 수익·이익을 확정적으로 표현하거나 보장하는 인상을 주는가?
          (예: "높은 수익을 드립니다", "안정적 수익 제공" 등도 위반 가능)

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "맥락상 단정적 수익 암시 의심 (LLM 판단)"
          confidence: 0.75
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"


  # ──────────────────────────────────────────────────────────
  # 위반유형 2 | 원금 보장 (제22조 제1항 제2호 · 자본시장법 준용)
  # 원금 손실이 가능한 상품에서 원금 보장을 표시하는 행위
  # ──────────────────────────────────────────────────────────
  - id: finsumer_22_2_원금보장
    law: 금융소비자보호법 제22조 및 동법 시행령 제19조
    name: 원금 보장 허위 표시 금지
    description: "원금 손실 가능 상품에서 원금 보장·안전 표현 금지"
    legal_basis:
      primary:
        - 금융소비자보호법 제22조
      supplementary:
        - 금융소비자보호법 시행령 제19조 (광고 시 금지행위)
        - 자본시장법 제55조 (손실보전 금지)
    nodes:

      - id: rule_22_2_a
        type: rule
        check: "원금 보장 직접 표현"
        pattern: '원금.{0,15}(보장|안전|100%|전액\s*지급|손실\s*없)|원금을?\s*(지켜\s*드리|지켜|보전|보호)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "원금 보장 허위 표시 금지 위반"
          confidence: 0.97
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "원금 보장 표현 즉시 삭제 및 원금손실 가능성 명시"

      - id: rule_22_2_b
        type: rule
        check: "원금 손실 불가 암시 표현"
        pattern: '(손실\s*없|잃지\s*않|원금\s*지키|원금을?\s*지켜|자산\s*보전).{0,25}(상품|펀드|투자|예금)|원금.{0,20}(잃지\s*않|손실\s*없)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "원금 손실 불가 암시 표현 금지 위반"
          confidence: 0.90
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "즉시 수정 요망"

      - id: llm_22_2
        type: llm
        model: llama-3.3-70b-versatile
        check: "간접적 원금 보장 암시 여부"
        trigger_when: rule_nodes_pass
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          원금 손실이 가능한 금융투자상품 광고에서 원금 보장을 암시하는지 판단하세요.
        prompt: |
          다음 광고 문구를 분석하세요.

          [광고 문구]
          {text}

          판단 기준: 직접적 '원금 보장' 표현이 없더라도, 원금 손실이 없다는 인상을 주는가?
          (예: "안전한 투자", "원금 걱정 없는 상품" 등)

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "간접적 원금 보장 암시 의심 (LLM 판단)"
          confidence: 0.78
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"


  # ──────────────────────────────────────────────────────────
  # 위반유형 3 | 손실 미고지 (제22조 제2항)
  # 원금손실 가능성을 광고에 명시하지 않는 행위
  # ──────────────────────────────────────────────────────────
  - id: finsumer_22_3_손실미고지
    law: 금융소비자보호법 제22조 및 동법 시행령 제18조
    name: 원금손실 가능성 미고지 금지
    description: "투자성 상품 광고 시 원금손실 가능성 필수 기재"
    legal_basis:
      primary:
        - 금융소비자보호법 제22조
      supplementary:
        - 금융소비자보호법 시행령 제18조 (광고 포함사항)
        - 금융소비자보호 감독규정 제16조
    nodes:

      - id: rule_22_3_a
        type: rule
        check: "투자성 상품 키워드 존재 확인 (투자 맥락 탐지)"
        pattern: '(펀드|ETF|주식|채권|파생|ELS|DLS|리츠|투자신탁|랩어카운트)'
        flags: IGNORECASE
        on_match:
          result: PASS        # 투자 상품 맥락 확인 — 다음 노드로 위임
          reason: "투자성 상품 광고 확인 — 손실고지 여부 추가 검토 필요"
          confidence: 0.0
          _internal: true     # 내부 라우팅용, 최종 판정에 포함 안 함

      - id: rule_22_3_b
        type: rule
        check: "손실 고지 문구 존재 여부 (역방향 — 없으면 위반)"
        pattern: '(원금\s*손실|손실\s*발생|투자\s*위험|원금\s*보장\s*않|손실\s*가능)'
        flags: IGNORECASE
        negate: true          # 패턴이 없을 때 위반 → 역방향 매칭
        prerequisite: rule_22_3_a   # 앞 노드가 PASS(투자 상품)일 때만 실행
        on_match:
          result: VIOLATION
          reason: "투자성 상품 광고에 원금손실 가능성 미고지"
          confidence: 0.88
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"
          action: "'이 상품은 원금손실이 발생할 수 있습니다' 등 손실 고지 문구 추가 필수"

      - id: llm_22_3
        type: llm
        model: llama-3.3-70b-versatile
        check: "손실 고지 충분성 판단 (형식적 고지 vs 실질적 고지)"
        trigger_when: always   # 투자 상품 광고는 항상 LLM 검토
        prerequisite: rule_22_3_a
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          투자성 금융상품 광고에서 원금손실 가능성 고지가 충분한지 판단하세요.
        prompt: |
          다음 투자성 상품 광고 문구를 분석하세요.

          [광고 문구]
          {text}

          판단 기준:
          1. 원금손실 가능성이 명시되어 있는가?
          2. 손실 고지가 지나치게 작은 글씨·주석으로만 처리되어 사실상 숨겨져 있는가?
          3. 손실 고지 문구가 수익 홍보 문구에 비해 현저히 부각되지 않는가?

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "손실 고지 불충분 의심 (LLM 판단)"
          confidence: 0.72
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"


  # ──────────────────────────────────────────────────────────
  # 위반유형 4 | 비용 누락 (제22조 제1항 제4호)
  # 수수료·세금 등 핵심 비용을 광고에 누락하는 행위
  # ──────────────────────────────────────────────────────────
  - id: finsumer_22_4_비용누락
    law: 금융소비자보호법 제22조 및 동법 시행령 제18조
    name: 핵심 비용 누락 금지
    description: "수수료·보수·세금 등 소비자 부담 비용의 중요 사항 미기재 금지"
    legal_basis:
      primary:
        - 금융소비자보호법 제22조
      supplementary:
        - 금융소비자보호법 시행령 제18조 (광고 포함사항)
        - 금융소비자보호 감독규정 제16조
    nodes:

      - id: rule_22_4_a
        type: rule
        check: "수익률 강조 + 비용 관련 언급 전무"
        pattern: '(수익률|연\s*\d+%|연간\s*\d+|예상\s*수익)'
        flags: IGNORECASE
        on_match:
          result: PASS
          reason: "수익률 광고 확인 — 비용 고지 여부 추가 검토 필요"
          confidence: 0.0
          _internal: true

      - id: rule_22_4_b
        type: rule
        check: "비용 고지 문구 역방향 탐지 (없으면 위반)"
        pattern: '(수수료|운용보수|판매보수|환매수수료|세금|비용|보수\s*\d|총\s*비용)'
        flags: IGNORECASE
        negate: true
        prerequisite: rule_22_4_a
        on_match:
          result: VIOLATION
          reason: "수익률 광고에 수수료 등 핵심 비용 미기재"
          confidence: 0.85
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"
          action: "총보수·수수료·세금 등 주요 비용 항목 명시 추가 필수"

      - id: rule_22_4_c
        type: rule
        check: "최저금리·우대조건 설명 부족 주의"
        pattern: '(최저|낮은|우대|특별).{0,12}(연\s*\d+(\.\d+)?\s*%|금리)|연\s*\d+(\.\d+)?\s*%\s*금리'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "최저금리 적용 조건·우대조건·심사기준 안내가 충분한지 확인이 필요합니다."
          confidence: 0.66
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"
          source: "금감원 2025.2.3 대출 광고 점검(최저금리만 비대칭 노출 지적)"
          action: "최저금리 적용 조건, 우대조건, 개인신용평가에 따른 차등 가능성을 명확히 표시"

      - id: rule_22_4_d
        type: rule
        check: "최대한도 강조 시 심사기준 확인 주의"
        pattern: '(최대|한도).{0,12}(\d+\s*억|[0-9,]+\s*만\s*원|[0-9,]+\s*원)'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "최대한도만 강조될 경우 실제 적용 가능 범위·심사기준 안내가 충분한지 확인이 필요합니다."
          confidence: 0.64
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"
          action: "한도 산정 기준, 개인신용평가 결과에 따른 제한 가능성, 실제 적용 범위를 함께 안내"

      - id: rule_22_4_e
        type: rule
        check: "빠른 심사·누구나 가능·특별혜택 등 조건 부족 주의"
        pattern: '(최대\s*1\s*시간|빠른\s*심사|즉시\s*승인|누구나\s*(가능|간편)|이번\s*달\s*특별\s*혜택|특별\s*혜택|지금\s*바로).{0,30}(대출|한도|신청|조건|확인)|직장인\s*누구나.{0,20}(대출|신청|가능)'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "심사 조건·예외·대상 제한이 충분히 안내되지 않으면 실제 이용 가능성에 대한 소비자 오인 가능성이 있습니다."
          confidence: 0.63
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"
          source: "금감원 2025.2.3 대출 광고 점검(신속성 과장 단정 표현 지적)"
          action: "심사 기준, 대상 조건, 승인 제한 가능성, 혜택 적용 조건을 함께 확인"

      - id: rule_22_4_f
        type: rule
        check: "부담 완화·합리적 조건 표현의 근거 확인 주의"
        pattern: '(부담을\s*낮춘|부담\s*완화|합리적인\s*(대출|금리|조건|상품)|낮은\s*부담).{0,20}(대출|상품|조건|금리)?'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "소비자 부담이 낮다는 표현은 실제 비용·금리·상환조건 안내가 충분한지 검토가 필요합니다."
          confidence: 0.6
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"
          source: "금감원 2025.2.18 보험 광고 점검(저렴 오인 표현 지적)"
          action: "금리 범위, 수수료, 상환조건, 적용 조건을 함께 표시했는지 확인"

      - id: llm_22_4
        type: llm
        model: llama-3.3-70b-versatile
        check: "비용 고지 적정성 판단 (형식적 기재 vs 소비자 인식 가능 여부)"
        trigger_when: rule_nodes_pass
        prerequisite: rule_22_4_a   # 수익률·금리 강조 광고일 때만 비용 검사 (위험고지 문구 오탐 방지)
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          금융상품 광고에서 수수료 및 비용 관련 정보 고지가 적절한지 판단하세요.
        prompt: |
          다음 광고 문구를 분석하세요.

          [광고 문구]
          {text}

          판단 기준:
          1. 수익률이나 금리를 강조하면서 관련 수수료·비용을 전혀 언급하지 않는가?
          2. 비용 정보가 지나치게 불명확하거나 소비자가 인식하기 어렵게 표시되었는가?
          3. 세후 수익률이 아닌 세전 수익률만 표시하면서 세금 관련 안내가 없는가?
          4. 최저~최고 금리 범위가 함께 표시된 경우, 그 사실만으로는 비용·조건 누락으로 판단하지 마세요.
          5. 단, 최저금리 적용 조건·우대조건·심사기준 등이 충분히 안내되지 않아
             일반 소비자가 실제 적용 가능 금리로 오인할 가능성이 있는 경우는 별도 검토 대상으로 보세요.
          6. 텍스트만으로 시각적 현저성(작은 글씨, 흐린 표시, 배치상 은폐 등)을 확정할 수 없으면,
             위반으로 단정하지 말고 Human-in-the-loop 기반 시각 검토 필요 사유로 설명하세요.

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "비용 고지 불충분 의심 (LLM 판단)"
          confidence: 0.70
          citation: "금융소비자보호법 제22조 및 동법 시행령 제18조"


  # ──────────────────────────────────────────────────────────
  # 위반유형 5 | 근거없는 비교 (제22조 제1항 제3호)
  # 타 금융상품·기관 대비 우위를 근거 없이 주장하는 행위
  # ──────────────────────────────────────────────────────────
  - id: finsumer_22_5_근거없는비교
    law: 금융소비자보호법 제22조 및 동법 시행령 제19조
    name: 근거없는 비교 광고 금지
    description: "객관적 근거 없이 타 상품·기관 대비 우위 표현 금지"
    exclude_pattern:
      - '법정\s*최고\s*금리'
      - '최대\s*연\s*15%'
      - '약정이율\s*\+\s*3%'
    legal_basis:
      primary:
        - 금융소비자보호법 제22조
      supplementary:
        - 금융소비자보호법 시행령 제19조 (광고 시 금지행위)
        - 표시·광고의 공정화에 관한 법률 제3조
    nodes:

      - id: rule_22_5_a
        type: rule
        check: "타 상품 대비 우위 직접 비교 표현"
        pattern: '(타\s*상품|다른\s*상품|타사|경쟁사|시중\s*은행|일반\s*예금).{0,20}(보다|대비|비해|높|우수|유리|최고|1위)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "객관적 근거 없는 비교 광고 금지 위반"
          confidence: 0.88
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "비교 근거 자료 첨부 또는 비교 표현 삭제"

      - id: rule_22_5_b
        type: rule
        check: "최상급 표현 사용 (업계 최고·국내 1위 등)"
        pattern: '(업계\s*최고|국내\s*최고|최저\s*수수료|최고\s*금리|1위|No\.?1|넘버원)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "근거 없는 최상급 표현 금지 위반"
          confidence: 0.85
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "수상·인증 근거 명시 또는 최상급 표현 삭제"

      - id: rule_22_5_c
        type: rule
        check: "시장 평균·동종 상품 대비 암시 표현"
        pattern: '(시장\s*평균|동종\s*상품|일반\s*상품|시중\s*금리).{0,20}(대비|보다|비해|경쟁력|유리|높|낮)'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "비교 기준·기준일·비교 대상이 명확한지 확인이 필요한 비교 암시 표현입니다."
          confidence: 0.67
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "비교 기준, 기준일, 비교 대상, 산출 근거를 표시하거나 비교 표현을 완화"

      - id: rule_22_5_d
        type: rule
        check: "인기·선택·추천 근거 부족 주의"
        pattern: '(많은\s*고객|다수\s*고객|고객\s*선택|인기\s*상품|추천\s*상품|가장\s*적합).{0,25}(상품|투자|자산|대출|관리|추천)?'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "인기·선택·추천 표현은 객관적 산출 근거와 기준이 없으면 소비자 오인 가능성이 있습니다."
          confidence: 0.61
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
          action: "추천·인기·선택의 조사 기준, 기간, 대상, 산출 근거를 표시하거나 표현을 완화"

      - id: llm_22_5
        type: llm
        model: llama-3.3-70b-versatile
        check: "우회적 비교 우위 암시 여부 (규칙 미탐지 케이스)"
        trigger_when: rule_nodes_pass
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          금융상품 광고에서 객관적 근거 없이 타 상품 대비 우위를 암시하는지 판단하세요.
        prompt: |
          다음 광고 문구를 분석하세요.

          [광고 문구]
          {text}

          판단 기준:
          1. 직접적인 비교 표현 없이도 타 상품보다 우월하다는 인상을 주는가?
          2. "시장 평균 대비", "동종 상품 중" 등의 표현으로 비교 우위를 암시하는가?
          3. 비교 근거(조사기관, 기준일, 비교 대상)가 구체적으로 명시되지 않았는가?
          4. "최저~최고 금리", "최대 한도"처럼 상품 조건의 범위를 사실 정보로 제시한 경우,
             그 표현만으로 비교 우위·단정적 우위라고 판단하지 마세요.
          5. 다만 유리한 조건만 상대적으로 강조되어 소비자 오인 가능성이 존재할 수 있습니다.
             시각적 강조 정도 판단은 이미지·레이아웃 요소를 포함하므로,
             텍스트만으로 확정하지 말고 Human-in-the-loop 기반 검토 대상으로 분류하세요.
          6. 최저금리 적용을 위한 우대조건·심사기준 등이 충분히 안내되지 않아
             일반 소비자가 실제 적용 가능한 금리 수준으로 오인할 가능성이 있으면 경고 대상으로 보세요.
          7. 실제 적용 가능 범위·심사기준 등에 대한 충분한 설명 없이 최대 한도만 강조될 경우
             소비자 오인 가능성이 있으므로 경고 대상으로 보세요.

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "근거 없는 비교 우위 암시 의심 (LLM 판단)"
          confidence: 0.73
          citation: "금융소비자보호법 제22조 및 동법 시행령 제19조"
