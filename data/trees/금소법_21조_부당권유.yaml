# ============================================================
# 금융소비자보호법 제21조 — 부당권유행위 금지 의사결정 트리 DSL
# Cross-Check AI | YAML DSL v1.0
#
# ★ 조항 정정: 원래 계획의 "제17조"는 오류. 부당권유행위 금지는
#   금융소비자보호법 제21조이다 (제17조는 적합성 원칙).
#
# 위반 유형 4가지:
#   1. 단정적_판단    — 불확실한 사항을 단정·확실하다고 오인 (제21조 제1호)
#   2. 거짓_과장      — 사실과 다르거나 과장된 내용 알림 (제21조 제2호)
#   3. 불안감_조성    — 긴박감·불안감 조성하여 권유 (시행령 부당권유 유형)
#   4. 불초청_압박    — 요청하지 않은 일방적·압박성 권유 (시행령)
#
# ⚠️ 법학 전공자 검수: 시행령 조문 번호 및 호 번호 정확성 확인 필요
# ============================================================

meta:
  law: 금융소비자보호법 제21조 (부당권유행위 금지)
  article: 21
  name: 부당권유행위 금지
  effective_date: "2021-03-25"
  version: "1.0-draft"
  description: >
    금융상품 권유 시 불확실한 사항에 대한 단정적 판단 제공, 거짓·과장,
    불안감 조성, 불초청·압박성 권유 등을 금지한다.
  legal_note: >
    제21조 각 호(제1호 단정적 판단, 제2호 거짓 내용 등)는 법률에 직접 규정.
    불안감 조성·불초청 권유 등은 동법 시행령의 부당권유 유형 — 시행령 조문 번호는 검수 필요.
  severity_weights:
    VIOLATION: 1.0
    WARNING: 0.6
    PASS: 0.0
  exclude_patterns:
    - '보장하지\s*않'
    - '확정되지\s*않'
    - '손실\s*가능'
    - '원금\s*손실(이)?\s*(발생|가능)'

rules:

  # ──────────────────────────────────────────────────────────
  # 위반유형 1 | 단정적 판단 제공 (제21조 제1호)
  # 불확실한 사항을 확실하다고 단정·오인하게 하는 권유
  # ──────────────────────────────────────────────────────────
  - id: finsumer_21_1_단정적판단
    law: 금융소비자보호법 제21조 제1호
    name: 단정적 판단 제공 금지
    description: "불확실한 투자 결과를 단정·확실하다고 오인하게 하는 권유 금지"
    legal_basis:
      primary:
        - 금융소비자보호법 제21조 제1호
      supplementary:
        - 금융소비자보호 감독규정
    nodes:
      - id: rule_21_1_a
        type: rule
        check: "단정적 확실성 표현 (확실어 + 상승·수익어)"
        pattern: '(반드시|틀림없이|무조건|확실히|확실하게|100%).{0,15}(오르|상승|수익|이익|성공|벌)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "불확실한 사항에 대한 단정적 판단 제공 (제21조 제1호)"
          confidence: 0.93
          citation: "금융소비자보호법 제21조 제1호"
          action: "'반드시 오른다' 등 단정적 표현 삭제, 불확실성·위험 명시"
      - id: rule_21_1_b
        type: rule
        check: "전문가 보증·확약 표현"
        pattern: '(전문가|애널리스트|운용역).{0,10}(보증|보장|확약|장담|추천)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "전문가 보증을 빙자한 단정적 판단 제공 (제21조 제1호)"
          confidence: 0.88
          citation: "금융소비자보호법 제21조 제1호"
          action: "보증·확약 표현 삭제"
      - id: llm_21_1
        type: llm
        model: llama-3.3-70b-versatile
        check: "맥락상 단정적 판단 제공 여부"
        trigger_when: rule_nodes_pass
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          금융상품 권유 문구가 불확실한 사항을 확실하다고 단정하는지 판단하세요.
        prompt: |
          다음 금융상품 권유 문구를 분석하세요.

          [문구]
          {text}

          판단 기준: 투자 결과가 불확실함에도 확실·단정적으로 표현하여
          소비자가 오인할 소지가 있는가?

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "맥락상 단정적 판단 제공 의심 (LLM 판단)"
          confidence: 0.73
          citation: "금융소비자보호법 제21조 제1호"

  # ──────────────────────────────────────────────────────────
  # 위반유형 2 | 거짓·과장 (제21조 제2호)
  # 금융상품 내용을 사실과 다르게 알리는 행위
  # ──────────────────────────────────────────────────────────
  - id: finsumer_21_2_거짓과장
    law: 금융소비자보호법 제21조 제2호
    name: 거짓·과장 내용 알림 금지
    description: "금융상품의 내용을 사실과 다르거나 과장되게 알리는 행위 금지"
    legal_basis:
      primary:
        - 금융소비자보호법 제21조 제2호
      supplementary:
        - 표시·광고의 공정화에 관한 법률 제3조
    nodes:
      - id: rule_21_2_a
        type: rule
        check: "절대적·과장 성공 표현"
        pattern: '(100%|절대|무조건).{0,10}(성공|수익|이익|벌|수익률)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "사실과 다른 과장된 수익 표현 (제21조 제2호)"
          confidence: 0.90
          citation: "금융소비자보호법 제21조 제2호"
          action: "과장 표현 삭제, 객관적 근거·위험 명시"
      - id: llm_21_2
        type: llm
        model: llama-3.3-70b-versatile
        check: "거짓·과장 권유 여부"
        trigger_when: rule_nodes_pass
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          권유 문구가 상품 내용을 사실과 다르게 또는 과장하여 알리는지 판단하세요.
        prompt: |
          다음 금융상품 권유 문구를 분석하세요.

          [문구]
          {text}

          판단 기준:
          1. 상품의 수익·안전성·조건을 사실과 다르게 또는 과장하여 표현하는가?
          2. "최저~최고 금리", "최대 한도"처럼 상품 조건의 범위를 사실 정보로 제시한 경우,
             그 표현만으로는 거짓·과장 권유로 판단하지 마세요.
          3. 단, 최저금리 적용 조건·우대조건·심사기준 등이 충분히 안내되지 않아
             일반 소비자가 실제 적용 가능 금리로 오인할 가능성이 있는 경우는 별도 검토 대상으로 보세요.
          4. 유리한 조건만 상대적으로 강조되어 소비자 오인 가능성이 존재할 수 있습니다.
             다만 시각적 강조 정도 판단은 이미지·레이아웃 요소를 포함하므로,
             텍스트만으로 확정하지 말고 Human-in-the-loop 기반 검토 대상으로 분류하세요.
          5. 대부분의 소비자가 적용받기 어려운 최저금리·최대 한도를 대표 조건처럼 표시하거나,
             실제 적용 가능 범위·심사기준을 충분히 설명하지 않은 경우는 경고 대상으로 보세요.

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "거짓·과장 권유 의심 (LLM 판단)"
          confidence: 0.70
          citation: "금융소비자보호법 제21조 제2호"

  # ──────────────────────────────────────────────────────────
  # 위반유형 3 | 불안감 조성 (시행령 부당권유 유형)
  # 긴박감·불안감을 조성하여 가입을 압박하는 권유
  # ──────────────────────────────────────────────────────────
  - id: finsumer_21_3_불안조성
    law: 금융소비자보호법 제21조 및 동법 시행령
    name: 불안감 조성 권유 금지
    description: "긴박감·불안감을 조성하여 합리적 판단을 방해하는 권유 금지"
    legal_basis:
      primary:
        - 금융소비자보호법 제21조
      supplementary:
        - 금융소비자보호법 시행령 (부당권유 유형)
    nodes:
      - id: rule_21_3_a
        type: rule
        check: "긴박감·마감 압박 표현"
        pattern: '(마감\s*임박|오늘\s*마감|마지막\s*기회|지금\s*안\s*하면|놓치면\s*후회|선착순|한정\s*수량|곧\s*마감)'
        flags: IGNORECASE
        on_match:
          result: VIOLATION
          reason: "불안감·긴박감 조성 부당권유 (제21조 및 시행령)"
          confidence: 0.85
          citation: "금융소비자보호법 제21조 및 동법 시행령"
          action: "긴박감 조성 표현 삭제, 충분한 숙고 기간 안내"
      - id: llm_21_3
        type: llm
        model: llama-3.3-70b-versatile
        check: "불안감 조성 권유 여부"
        trigger_when: rule_nodes_pass
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          권유 문구가 불안감·긴박감을 조성하여 소비자의 합리적 판단을 방해하는지 판단하세요.
        prompt: |
          다음 금융상품 권유 문구를 분석하세요.

          [문구]
          {text}

          판단 기준: '지금 안 하면 손해', '마감 임박' 등 불안감·긴박감을
          조성하여 즉각적 가입을 압박하는가?

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "불안감 조성 권유 의심 (LLM 판단)"
          confidence: 0.72
          citation: "금융소비자보호법 제21조 및 동법 시행령"

  # ──────────────────────────────────────────────────────────
  # 위반유형 4 | 불초청·압박 권유 (시행령 부당권유 유형)
  # 요청하지 않은 일방적·압박성 즉시 가입 권유
  # ──────────────────────────────────────────────────────────
  - id: finsumer_21_4_불초청압박
    law: 금융소비자보호법 제21조 및 동법 시행령
    name: 불초청·압박 권유 금지
    description: "소비자 요청 없이 일방적·압박적으로 즉시 가입을 권유하는 행위 금지"
    legal_basis:
      primary:
        - 금융소비자보호법 제21조
      supplementary:
        - 금융소비자보호법 시행령 (불초청 권유 등)
    nodes:
      - id: rule_21_4_a
        type: rule
        check: "즉시 가입 압박 표현"
        pattern: '(지금\s*바로|즉시|당장|망설이지\s*말고|고민\s*말고).{0,8}(가입|신청|투자|결정|시작)'
        flags: IGNORECASE
        on_match:
          result: WARNING
          reason: "즉시 가입을 압박하는 권유 표현 (제21조 및 시행령)"
          confidence: 0.70
          citation: "금융소비자보호법 제21조 및 동법 시행령"
          action: "즉시 가입 압박 표현 완화, 비교·숙고 권장 문구 추가"
      - id: llm_21_4
        type: llm
        model: llama-3.3-70b-versatile
        check: "불초청·압박성 권유 여부"
        trigger_when: rule_nodes_pass
        system_prompt: >
          당신은 금융소비자보호법 전문 준법 심사관입니다.
          권유 문구가 소비자의 충분한 검토 없이 즉각적·일방적 가입을 압박하는지 판단하세요.
        prompt: |
          다음 금융상품 권유 문구를 분석하세요.

          [문구]
          {text}

          판단 기준: 충분한 정보 제공·비교 없이 '지금 바로 가입' 등
          즉각적 결정을 압박하는가?

          반드시 아래 JSON 형식으로만 답하세요:
          {{"triggered": true/false, "reason": "판단 근거 1~2문장 (반드시 '~합니다' 존댓말체로 작성)", "confidence": 0.0~1.0}}
        on_match:
          result: WARNING
          reason: "불초청·압박 권유 의심 (LLM 판단)"
          confidence: 0.68
          citation: "금융소비자보호법 제21조 및 동법 시행령"
